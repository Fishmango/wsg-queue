<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>29's Queue Tracker</title>
    <!-- Google Fonts classic retro display -->
    <link href="https://googleapis.com" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1>Warsong Gulch Queue</h1>
        
        <div class="factions">
            <div class="faction-card alliance">
                <div>Alliance</div>
                <span id="ally-count" class="count-num">0</span>
            </div>
            <div class="faction-card horde">
                <div>Horde</div>
                <span id="horde-count" class="count-num">0</span>
            </div>
        </div>

        <!-- Auth Section -->
        <div id="auth-section">
            <p class="status-msg">Enter your character details to join the queue</p>
            <input type="text" id="username" placeholder="Character Name" maxlength="12">
            <br>
            <select id="player-class">
                <option value="" disabled selected>-- Select Your Class --</option>
                <option value="Druid">Druid</option>
                <option value="Hunter">Hunter</option>
                <option value="Mage">Mage</option>
                <option value="Paladin">Paladin</option>
                <option value="Priest">Priest</option>
                <option value="Rogue">Rogue</option>
                <option value="Shaman">Shaman</option>
                <option value="Warlock">Warlock</option>
                <option value="Warrior">Warrior</option>
            </select>
            <div class="btn-zone">
                <button class="btn-alliance" id="btn-join-alliance">Join Alliance</button>
                <button class="btn-horde" id="btn-join-horde">Join Horde</button>
            </div>
        </div>

        <!-- Queued Section -->
        <div id="queued-section" class="hidden">
            <p class="status-msg">You are standing by in queue!</p>
            <div style="font-size: 1.3rem; margin: 20px 0; font-family: 'Cinzel', serif;">
                Ready as: <span id="user-display"></span>
            </div>
            <button class="btn-leave" id="btn-leave-queue">Leave Queue</button>
        </div>

        <!-- LIVE PLAYER ROSTER LISTS -->
        <div class="roster-section">
            <div class="roster-title">Active Roster</div>
            <div class="roster-grid">
                <div class="roster-col">
                    <div class="roster-col-title" style="color: #0078ff;">Alliance Forces</div>
                    <div id="alliance-list"></div>
                </div>
                <div class="roster-col">
                    <div class="roster-col-title" style="color: #ff3838;">Horde Forces</div>
                    <div id="horde-list"></div>
                </div>
            </div>
        </div>
    </div>
    <style>
        body { 
            background-color: #0b0c0d; 
            background-image: radial-gradient(circle, #15181c 0%, #050607 100%);
            color: #ffd100; 
            font-family: 'Open Sans', sans-serif; 
            text-align: center; 
            padding: 40px 20px; 
            margin: 0;
        }
        .container { 
            max-width: 650px; 
            margin: 0 auto; 
            background: #121417; 
            padding: 30px; 
            border-radius: 6px; 
            border: 2px solid #3a3324; 
            box-shadow: 0px 10px 30px rgba(0,0,0,0.7);
        }
        .factions { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 25px 0; }
        .faction-card { background: #1a1d23; padding: 15px; border-radius: 4px; border: 1px solid #2b303b; }
        .alliance { color: #0078ff; border-color: rgba(0, 120, 255, 0.3); text-shadow: 0 0 8px rgba(0, 120, 255, 0.4); }
        .horde { color: #ff3838; border-color: rgba(255, 56, 56, 0.3); text-shadow: 0 0 8px rgba(255, 56, 56, 0.4); }
        .count-num { font-family: 'Cinzel', serif; font-size: 3.5rem; font-weight: 800; display: block; margin-top: 5px; }
        input[type="text"], select { width: 80%; padding: 12px; background: #08090a; border: 1px solid #3a3324; color: #fff; font-size: 1rem; border-radius: 4px; margin-bottom: 15px; text-align: center; }
        select { text-align-last: center; cursor: pointer; }
        .btn-zone { display: flex; justify-content: space-around; gap: 15px; }
        button { flex: 1; padding: 14px 20px; font-family: 'Cinzel', serif; font-size: 1rem; font-weight: bold; cursor: pointer; border-radius: 4px; border: 1px solid rgba(0,0,0,0.4); transition: transform 0.1s, filter 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        button:hover { filter: brightness(1.2); }
        button:active { transform: scale(0.98); }
        .btn-alliance { background: linear-gradient(180deg, #0052b4 0%, #003375 100%); color: white; }
        .btn-horde { background: linear-gradient(180deg, #b41c1c 0%, #700f0f 100%); color: white; }
        .btn-leave { background: #333; color: #bbb; border: 1px solid #444; width: 100%; margin-top: 15px;}
        .hidden { display: none !important; }
        .status-msg { color: #888; font-style: italic; margin-bottom: 15px; }
        .roster-section { margin-top: 35px; border-top: 1px solid #3a3324; padding-top: 25px; text-align: left; }
        .roster-title { font-family: 'Cinzel', serif; font-size: 1.3rem; color: #ffd100; margin-bottom: 15px; text-align: center; }
        .roster-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .roster-col { background: #0d0f12; border-radius: 4px; border: 1px solid #23272f; padding: 15px; min-height: 120px; }
        .roster-col-title { font-family: 'Cinzel', serif; font-size: 1rem; margin-bottom: 10px; border-bottom: 1px dashed #3a3324; padding-bottom: 5px; }
        
        .player-item { display: flex; align-items: center; padding: 6px 0; font-weight: 600; border-bottom: 1px solid #171b22; }
        .empty-msg { color: #555; font-style: italic; font-size: 0.9rem; margin-top: 10px; }

        /* Icon formatting structure optimized for local folder assets */
        .class-icon {
            width: 28px;
            height: 28px;
            margin-right: 12px;
            border-radius: 50%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: inline-block;
            box-shadow: 0 0 5px rgba(0,0,0,0.8);
            border: 1px solid rgba(255,209,0,0.2);
            vertical-align: middle;
        }

        /* Official World of Warcraft Class Color Specifications */
        .class-warrior { color: #C69B6D; } .class-paladin { color: #F48CBA; } .class-hunter { color: #AAD372; }
        .class-rogue { color: #FFF468; } .class-priest { color: #FFFFFF; } .class-shaman { color: #0070DE; }
        .class-mage { color: #3FC7EB; } .class-warlock { color: #8788EE; } .class-druid { color: #FF7C0A; }
    </style>
    <script>
        const queueChannel = new BroadcastChannel('wsg_global_mesh_queue');
        
        let currentUserId = null;
        let activeRosterData = [];

        // FIXED: Dynamically paths your selection directly to your local PC "icons" subfolder
        const classIcons = {
            druid: "./images/druid.png",
            hunter: "./images/hunt.png",
            mage: "./images/mage.png",
            paladin: "./images/pala.png",
            priest: "./images/priest.png",
            rogue: "./images/rogue.png",
            shaman: "./images/shaman.png",
            warlock: "./images/wlock.png",
            warrior: "./images/warr.png",
        };

        function init() {
            const savedData = localStorage.getItem('wsg_mesh_db');
            activeRosterData = savedData ? JSON.parse(savedData) : [];
            
            updateDashboardDisplays();
            checkLocalSession();

            queueChannel.onmessage = (event) => {
                if (event.data && event.data.type === 'SYNC_ROSTER') {
                    activeRosterData = event.data.payload;
                    localStorage.setItem('wsg_mesh_db', JSON.stringify(activeRosterData));
                    updateDashboardDisplays();
                }
            };

            setInterval(() => {
                queueChannel.postMessage({ type: 'REQUEST_SYNC' });
            }, 3000);
        }

        function updateDashboardDisplays() {
            const alliancePlayers = activeRosterData.filter(p => p.faction === 'Alliance');
            const hordePlayers = activeRosterData.filter(p => p.faction === 'Horde');

            document.getElementById('ally-count').innerText = alliancePlayers.length;
            document.getElementById('horde-count').innerText = hordePlayers.length;

            renderRosterColumn('alliance-list', alliancePlayers);
            renderRosterColumn('horde-list', hordePlayers);
        }

        function renderRosterColumn(elementId, players) {
            const listContainer = document.getElementById(elementId);
            listContainer.innerHTML = '';

            if (players.length === 0) {
                listContainer.innerHTML = '<div class="empty-msg">Noone queued</div>';
                return;
            }

            players.forEach(player => {
                const playerClass = player.player_class || 'Unknown';
                const classLower = playerClass.toLowerCase();
                const iconUrl = classIcons[classLower] || classIcons.unknown;

                const playerDiv = document.createElement('div');
                playerDiv.className = `player-item class-${classLower}`;
                playerDiv.innerHTML = `
                    <div class="class-icon" style="background-image: url('${iconUrl}');"></div>
                    <span>${player.username}</span>
                `;
                listContainer.appendChild(playerDiv);
            });
        }

        function signIn(faction) {
            const username = document.getElementById('username').value.trim();
            const chosenClass = document.getElementById('player-class').value;

            if (!username) return alert("Please enter your character name!");
            if (!chosenClass) return alert("Please select your character class!");

            let customId = localStorage.getItem('wsg_mesh_user_id');
            if (!customId) {
                customId = 'char_' + Math.random().toString(36).substr(2, 9);
                localStorage.setItem('wsg_mesh_user_id', customId);
            }
            currentUserId = customId;

            activeRosterData = activeRosterData.filter(p => p.id !== currentUserId);

            activeRosterData.push({
                id: currentUserId,
                username: username,
                faction: faction,
                player_class: chosenClass
            });

            localStorage.setItem('wsg_mesh_db', JSON.stringify(activeRosterData));
            queueChannel.postMessage({ type: 'SYNC_ROSTER', payload: activeRosterData });

            localStorage.setItem('wsg_mesh_name', username);
            localStorage.setItem('wsg_mesh_faction', faction);
            localStorage.setItem('wsg_mesh_class', chosenClass);

            showQueuedState(username, faction, chosenClass);
            updateDashboardDisplays();
        }

        function leaveQueue() {
            if (!currentUserId) return;

            activeRosterData = activeRosterData.filter(p => p.id !== currentUserId);
            
            localStorage.setItem('wsg_mesh_db', JSON.stringify(activeRosterData));
            queueChannel.postMessage({ type: 'SYNC_ROSTER', payload: activeRosterData });

            currentUserId = null;
            localStorage.removeItem('wsg_mesh_name');
            localStorage.removeItem('wsg_mesh_faction');
            localStorage.removeItem('wsg_mesh_class');

            document.getElementById('auth-section').classList.remove('hidden');
            document.getElementById('queued-section').classList.add('hidden');
            updateDashboardDisplays();
        }

        function checkLocalSession() {
            const localId = localStorage.getItem('wsg_mesh_user_id');
            const localName = localStorage.getItem('wsg_mesh_name');
            const localFaction = localStorage.getItem('wsg_mesh_faction');
            const localClass = localStorage.getItem('wsg_mesh_class');
            
            if (localId && localName && localFaction && localClass) {
                currentUserId = localId;
                showQueuedState(localName, localFaction, localClass);
            }
        }

        function showQueuedState(name, faction, playerClass) {
            const display = document.getElementById('user-display');
            display.innerText = `${name} (${playerClass})`;
            display.className = `class-${playerClass.toLowerCase()}`;
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('queued-section').classList.remove('hidden');
        }

        document.getElementById('btn-join-alliance').addEventListener('click', () => signIn('Alliance'));
        document.getElementById('btn-join-horde').addEventListener('click', () => signIn('Horde'));
        document.getElementById('btn-leave-queue').addEventListener('click', leaveQueue);
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
