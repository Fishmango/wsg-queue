<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>29's Queue Tracker</title>
    <!-- Google Fonts classic retro display -->
    <link href="https://googleapis.com" rel="stylesheet">
    <!-- Pusher Cloud Realtime Core Engine -->
    <script src="https://pusher.com"></script>
</head>
<body>
    <div class="container">
        <!-- Match Banner Notification Area -->
        <div id="match-banner" class="hidden">BATTLE FOR WARSONG GULCH IS ACTIVE!</div>

        <h1>29's Queue Tracker</h1>
        <div class="factions">
            <div class="faction-card alliance">
                <div>Alliance</div>
                <span id="ally-count" class="count-num">0</span>
            </div>
            <div class="faction-card horde">
                <div>Horde</div>
                <span id="horde-count" class="count-num">0</span>
            </div>
        </div>

        <!-- Auth Section -->
        <div id="auth-section">
            <p class="status-msg">Enter your character details to join the queue</p>
            <input type="text" id="username" placeholder="Character Name" maxlength="12">
            <br>
            <select id="player-class">
                <option value="" disabled selected>-- Select Your Class --</option>
                <option value="Druid">Druid</option>
                <option value="Hunter">Hunter</option>
                <option value="Mage">Mage</option>
                <option value="Paladin">Paladin</option>
                <option value="Priest">Priest</option>
                <option value="Rogue">Rogue</option>
                <option value="Shaman">Shaman</option>
                <option value="Warlock">Warlock</option>
                <option value="Warrior">Warrior</option>
            </select>
            <div class="btn-zone">
                <button class="btn-alliance" id="btn-join-alliance">Join Alliance</button>
                <button class="btn-horde" id="btn-join-horde">Join Horde</button>
            </div>
        </div>

        <!-- Queued Section -->
        <div id="queued-section" class="hidden">
            <p class="status-msg">You are standing by in queue!</p>
            <div style="font-size: 1.3rem; margin: 15px 0; font-family: 'Cinzel', serif;">
                Ready as: <span id="user-display"></span>
            </div>
            <div id="afk-warning-text" style="color: #ff3838; font-size: 0.9rem; margin-bottom: 10px; font-weight: bold;"></div>
            <div class="btn-zone" style="max-width: 400px; margin: 0 auto;">
                <button class="btn-refresh" id="btn-refresh-queue">Still Active</button>
                <button class="btn-leave" id="btn-leave-queue" style="margin-top: 0;">Leave Queue</button>
            </div>
        </div>

        <!-- LIVE PLAYER ROSTER LISTS -->
        <div class="roster-section">
            <div class="roster-title">Active Roster</div>
            <div class="roster-grid">
                <div class="roster-col">
                    <div class="roster-col-title" style="color: #0078ff;">Alliance Forces</div>
                    <div id="alliance-list"></div>
                </div>
                <div class="roster-col">
                    <div class="roster-col-title" style="color: #ff3838;">Horde Forces</div>
                    <div id="horde-list"></div>
                </div>
            </div>
        </div>
    </div>
    <style>
        body { background-color: #0b0c0d; background-image: radial-gradient(circle, #15181c 0%, #050607 100%); color: #ffd100; font-family: 'Open Sans', sans-serif; text-align: center; padding: 40px 20px; margin: 0; }
        .container { max-width: 650px; margin: 0 auto; background: #121417; padding: 30px; border-radius: 6px; border: 2px solid #3a3324; box-shadow: 0px 10px 30px rgba(0,0,0,0.7); position: relative;}
        .factions { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 25px 0; }
        .faction-card { background: #1a1d23; padding: 15px; border-radius: 4px; border: 1px solid #2b303b; }
        .alliance { color: #0078ff; border-color: rgba(0, 120, 255, 0.3); text-shadow: 0 0 8px rgba(0, 120, 255, 0.4); }
        .horde { color: #ff3838; border-color: rgba(255, 56, 56, 0.3); text-shadow: 0 0 8px rgba(255, 56, 56, 0.4); }
        .count-num { font-family: 'Cinzel', serif; font-size: 3.5rem; font-weight: 800; display: block; margin-top: 5px; }
        input[type="text"], select { width: 80%; padding: 12px; background: #08090a; border: 1px solid #3a3324; color: #fff; font-size: 1rem; border-radius: 4px; margin-bottom: 15px; text-align: center; }
        select { text-align-last: center; cursor: pointer; }
        .btn-zone { display: flex; justify-content: space-around; gap: 15px; }
        button { flex: 1; padding: 14px 20px; font-family: 'Cinzel', serif; font-size: 1rem; font-weight: bold; cursor: pointer; border-radius: 4px; border: 1px solid rgba(0,0,0,0.4); transition: transform 0.1s, filter 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        button:hover { filter: brightness(1.2); }
        button:active { transform: scale(0.98); }
        .btn-alliance { background: linear-gradient(180deg, #0052b4 0%, #003375 100%); color: white; }
        .btn-horde { background: linear-gradient(180deg, #b41c1c 0%, #700f0f 100%); color: white; }
        .btn-refresh { background: linear-gradient(180deg, #ffd100 0%, #b39200 100%); color: #111; }
        .btn-leave { background: #333; color: #bbb; border: 1px solid #444; margin-top: 15px;}
        .hidden { display: none !important; }
        .status-msg { color: #888; font-style: italic; margin-bottom: 15px; }
        .roster-section { margin-top: 35px; border-top: 1px solid #3a3324; padding-top: 25px; text-align: left; }
        .roster-title { font-family: 'Cinzel', serif; font-size: 1.3rem; color: #ffd100; margin-bottom: 15px; text-align: center; }
        .roster-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .roster-col { background: #0d0f12; border-radius: 4px; border: 1px solid #23272f; padding: 15px; min-height: 120px; }
        .roster-col-title { font-family: 'Cinzel', serif; font-size: 1rem; margin-bottom: 10px; border-bottom: 1px dashed #3a3324; padding-bottom: 5px; }
        .player-item { display: flex; align-items: center; justify-content: space-between; padding: 6px 0; font-weight: 600; border-bottom: 1px solid #171b22; }
        .empty-msg { color: #555; font-style: italic; font-size: 0.9rem; margin-top: 10px; }
        .class-icon { width: 28px; height: 28px; margin-right: 12px; border-radius: 50%; background-size: cover; background-position: center; background-repeat: no-repeat; display: inline-block; box-shadow: 0 0 5px rgba(0,0,0,0.8); border: 1px solid rgba(255,209,0,0.2); vertical-align: middle; }
        .time-badge { font-size: 0.75rem; color: #666; font-weight: normal; font-style: italic; padding-right: 2px; }
        
        #match-banner { background: linear-gradient(90deg, rgba(179,146,0,0) 0%, rgba(179,146,0,0.2) 50%, rgba(179,146,0,0) 100%); border-top: 1px solid #ffd100; border-bottom: 1px solid #ffd100; color: #ffd100; font-family: 'Cinzel', serif; font-size: 1.1rem; font-weight: bold; padding: 10px 0; margin-bottom: 25px; animation: pulseGlow 2s infinite alternate; letter-spacing: 1px; }
        @keyframes pulseGlow { 0% { text-shadow: 0 0 5px rgba(255,209,0,0.3); background-color: rgba(179,146,0,0.05); } 100% { text-shadow: 0 0 15px rgba(255,209,0,0.8); background-color: rgba(179,146,0,0.2); } }

        /* Official World of Warcraft Class Color Specifications */
        .class-warrior { color: #C69B6D; } .class-paladin { color: #F48CBA; } .class-hunter { color: #AAD372; }
        .class-rogue { color: #FFF468; } .class-priest { color: #FFFFFF; } .class-shaman { color: #0070DE; }
        .class-mage { color: #3FC7EB; } .class-warlock { color: #8788EE; } .class-druid { color: #FF7C0A; }
    </style>
<script>
        const PUSHER_KEY = "a46e28615788528d2135";
        const PUSHER_CLUSTER = "eu";

        let pusherClient = null;
        let cloudChannel = null;
        let currentUserId = null;
        let activeRosterData = [];
        let afkCheckInterval = null;

        const classIcons = { 
            druid: "./images/druid.png", hunter: "./images/hunt.png", mage: "./images/mage.png", 
            paladin: "./images/pala.png", priest: "./images/priest.png", rogue: "./images/rogue.png", 
            shaman: "./images/shaman.png", warlock: "./images/wlock.png", warrior: "./images/warr.png",
            unknown: "./images/unknown.png"
        };

        function init() {
            // FIXED: Using cache- prefix allows serverless, direct client-to-client broadcasts
            pusherClient = new Pusher(PUSHER_KEY, { cluster: PUSHER_CLUSTER });
            cloudChannel = pusherClient.subscribe('cache-wsg-global-channel');

            const savedData = localStorage.getItem('wsg_mesh_db');
            activeRosterData = savedData ? JSON.parse(savedData) : [];
            
            updateDashboardDisplays();
            checkLocalSession();

            // Listen for direct sync triggers from other devices on the internet
            cloudChannel.bind('client-sync-roster', function(data) {
                if (data && data.payload) {
                    activeRosterData = data.payload;
                    localStorage.setItem('wsg_mesh_db', JSON.stringify(activeRosterData));
                    updateDashboardDisplays();
                }
            });

            // When a new device opens the page, it whispers a request for data
            cloudChannel.bind('client-request-sync', function() {
                if (activeRosterData.length > 0) {
                    // Send our data list out so the new device matches us
                    cloudChannel.trigger('client-sync-roster', { payload: activeRosterData });
                }
            });

            // Once connected, ask any open windows across the world for the current list
            pusherClient.connection.bind('connected', () => {
                setTimeout(() => {
                    cloudChannel.trigger('client-request-sync', {});
                }, 1000);
            });

            setInterval(() => {
                updateDashboardDisplays(); 
                checkAfkTimeout();          
            }, 4000);
        }

        function updateDashboardDisplays() {
            const alliancePlayers = activeRosterData.filter(p => p.faction === 'Alliance');
            const hordePlayers = activeRosterData.filter(p => p.faction === 'Horde');

            document.getElementById('ally-count').innerText = alliancePlayers.length;
            document.getElementById('horde-count').innerText = hordePlayers.length;

            const banner = document.getElementById('match-banner');
            if (alliancePlayers.length >= 10 && hordePlayers.length >= 10) {
                banner.classList.remove('hidden');
            } else {
                banner.classList.add('hidden');
            }

            renderRosterColumn('alliance-list', alliancePlayers);
            renderRosterColumn('horde-list', hordePlayers);
        }

        function renderRosterColumn(elementId, players) {
            const listContainer = document.getElementById(elementId);
            listContainer.innerHTML = '';

            if (players.length === 0) {
                listContainer.innerHTML = '<div class="empty-msg">None queued</div>';
                return;
            }

            players.sort((a, b) => a.joined_at - b.joined_at);

            players.forEach((player, index) => {
                const playerClass = player.player_class || 'Unknown';
                const classLower = playerClass.toLowerCase();
                const iconUrl = classIcons[classLower] || classIcons.unknown;

                const elapsedMs = Date.now() - (player.joined_at || Date.now());
                const elapsedMins = Math.floor(elapsedMs / 60000);
                const timeString = elapsedMins <= 0 ? 'just now' : `${elapsedMins}m ago`;

                const playerDiv = document.createElement('div');
                playerDiv.className = `player-item class-${classLower}`;
                playerDiv.innerHTML = `
                    <div style="display: flex; align-items: center;">
                        <div class="class-icon" style="background-image: url('${iconUrl}');"></div>
                        <span>${player.username}</span>
                    </div>
                    <span class="time-badge">${timeString}</span>
                `;
                listContainer.appendChild(playerDiv);

                if (index === 9 && players.length > 10) {
                    const dividerDiv = document.createElement('div');
                    dividerDiv.style.margin = '15px 0 10px 0';
                    dividerDiv.style.borderTop = '2px dashed #ffd100';
                    dividerDiv.style.position = 'relative';
                    dividerDiv.style.textAlign = 'center';
                    
                    const dividerLabel = document.createElement('span');
                    dividerLabel.innerText = 'WAITLIST / BENCH';
                    dividerLabel.style.position = 'absolute';
                    dividerLabel.style.top = '-9px';
                    dividerLabel.style.left = '50%';
                    dividerLabel.style.transform = 'translateX(-50%)';
                    dividerLabel.style.background = '#0d0f12';
                    dividerLabel.style.padding = '0 10px';
                    dividerLabel.style.fontSize = '0.7rem';
                    dividerLabel.style.color = '#666';
                    dividerLabel.style.letterSpacing = '1px';
                    dividerLabel.style.fontWeight = 'bold';

                    dividerDiv.appendChild(dividerLabel);
                    listContainer.appendChild(dividerDiv);
                }
            });
        }
        function signIn(faction) {
            const username = document.getElementById('username').value.trim();
            const chosenClass = document.getElementById('player-class').value;

            if (!username) return alert("Please enter your character name!");
            if (!chosenClass) return alert("Please select your character class!");

            if (chosenClass === "Paladin" && faction === "Horde") {
                return alert("Error: Paladins can only join the Alliance!");
            }
            if (chosenClass === "Shaman" && faction === "Alliance") {
                return alert("Error: Shamans can only join the Horde!");
            }

            let customId = localStorage.getItem('wsg_mesh_user_id');
            if (!customId) {
                customId = 'char_' + Math.random().toString(36).substr(2, 9);
                localStorage.setItem('wsg_mesh_user_id', customId);
            }
            currentUserId = customId;

            activeRosterData = activeRosterData.filter(p => p.id !== currentUserId);

            activeRosterData.push({
                id: currentUserId,
                username: username,
                faction: faction,
                player_class: chosenClass,
                joined_at: Date.now(),
                last_active: Date.now()
            });

            syncAndPushToCloud();
            
            localStorage.setItem('wsg_mesh_name', username);
            localStorage.setItem('wsg_mesh_faction', faction);
            localStorage.setItem('wsg_mesh_class', chosenClass);

            showQueuedState(username, faction, chosenClass);
            updateDashboardDisplays();
            startAfkClock();
        }

        function leaveQueue() {
            if (!currentUserId) return;

            activeRosterData = activeRosterData.filter(p => p.id !== currentUserId);
            syncAndPushToCloud();

            currentUserId = null;
            localStorage.removeItem('wsg_mesh_name');
            localStorage.removeItem('wsg_mesh_faction');
            localStorage.removeItem('wsg_mesh_class');

            clearInterval(afkCheckInterval);
            document.getElementById('afk-warning-text').innerText = '';
            document.getElementById('auth-section').classList.remove('hidden');
            document.getElementById('queued-section').classList.add('hidden');
            updateDashboardDisplays();
        }

        function startAfkClock() {
            clearInterval(afkCheckInterval);
            
            afkCheckInterval = setInterval(() => {
                if (!currentUserId) return;
                
                const me = activeRosterData.find(p => p.id === currentUserId);
                if (!me) return;

                const elapsedMs = Date.now() - me.last_active;
                const remainingSecs = Math.max(0, 1800 - Math.floor(elapsedMs / 1000));

                const warningLabel = document.getElementById('afk-warning-text');
                
                if (remainingSecs <= 0) {
                    alert("You have been removed from the queue due to 30 minutes of inactivity.");
                    leaveQueue();
                } else if (remainingSecs <= 60) {
                    warningLabel.innerText = `Inactivity warning: Removing in ${remainingSecs}s! Click 'Still Active' to reset.`;
                } else {
                    const remainingMins = Math.ceil(remainingSecs / 60);
                    warningLabel.innerText = `AFK Auto-Timeout in: ${remainingMins}m`;
                }
            }, 1000);
        }

        function refreshActivityState() {
            if (!currentUserId) return;
            const me = activeRosterData.find(p => p.id === currentUserId);
            if (me) {
                me.last_active = Date.now();
                syncAndPushToCloud();
                alert("Your queue status has been extended for another 30 minutes!");
            }
        }

        function checkAfkTimeout() {
            const beforeLength = activeRosterData.length;
            activeRosterData = activeRosterData.filter(p => {
                const idleMs = Date.now() - (p.last_active || Date.now());
                return idleMs < 1830000;
            });

            if (activeRosterData.length !== beforeLength) {
                syncAndPushToCloud();
            }
        }

        // FIXED: Direct client-to-client cloud trigger bypasses the broken Vercel server loop entirely
        function syncAndPushToCloud() {
            localStorage.setItem('wsg_mesh_db', JSON.stringify(activeRosterData));
            
            if (cloudChannel && pusherClient.connection.state === 'connected') {
                cloudChannel.trigger('client-sync-roster', { payload: activeRosterData });
            }
        }

        function checkLocalSession() {
            const localId = localStorage.getItem('wsg_mesh_user_id');
            const localName = localStorage.getItem('wsg_mesh_name');
            const localFaction = localStorage.getItem('wsg_mesh_faction');
            const localClass = localStorage.getItem('wsg_mesh_class');

            if (localId && localName && localFaction && localClass) {
                currentUserId = localId;
                showQueuedState(localName, localFaction, localClass);
                startAfkClock();
            }
        }

        function showQueuedState(name, faction, playerClass) {
            const display = document.getElementById('user-display');
            display.innerText = `${name} (${playerClass})`;
            display.className = `class-${playerClass.toLowerCase()}`;
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('queued-section').classList.remove('hidden');
        }

        document.getElementById('btn-join-alliance').addEventListener('click', () => signIn('Alliance'));
        document.getElementById('btn-join-horde').addEventListener('click', () => signIn('Horde'));
        document.getElementById('btn-leave-queue').addEventListener('click', leaveQueue);
        document.getElementById('btn-refresh-queue').addEventListener('click', refreshActivityState);

        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
